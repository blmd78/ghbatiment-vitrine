services:
  postgres:
    image: postgres:17-alpine
    container_name: ghbat-postgres
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_DB: ghbatiment
      POSTGRES_USER: ghbat
      POSTGRES_PASSWORD: ghbat_local
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
